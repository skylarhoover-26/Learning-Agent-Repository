  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d:var(--accent,#0055FF);color:#fff;display:grid;place-items:center;font-family:'Plus Jakarta Sans';font-weight:700;font-size:13px;flex:none;\">1<\u002Fspan>\n        <span style=\"font-family:'Open Sans',sans-serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim,rgba(255,255,255,.55));font-weight:700;\">How deep do you want to go?<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;\">\n        <sc-for list=\"{{ depths }}\" as=\"d\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ d.set }}\" class=\"lift\" style=\"{{ d.cardStyle }}\" style-hover=\"transform:translateY(-5px);\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n              <span style=\"{{ d.iconChip }}\">{{ d.icon }}<\u002Fspan>\n              <span style=\"font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;color:var(--ink-dim,rgba(255,255,255,.6));background:var(--glass,rgba(255,255,255,.06));border:1px solid var(--line,rgba(255,255,255,.14));padding:4px 10px;border-radius:999px;white-space:nowrap;\">{{ d.time }}<\u002Fspan>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:18px;color:var(--ink,#fff);\">{{ d.title }}<\u002Fdiv>\n              <div style=\"font-family:'Open Sans',sans-serif;font-size:13px;line-height:1.45;color:var(--ink-dim,rgba(255,255,255,.55));margin-top:6px;\">{{ d.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- step 2: format -->\n      <div style=\"display:flex;align-items:center;gap:12px;margin:42px 0 18px;\">\n        <span style=\"width:26px;height:26px;border-radius:50%;background:var(--accent,#0055FF);color:#fff;display:grid;place-items:center;font-family:'Plus Jakarta Sans';font-weight:700;font-size:13px;flex:none;\">2<\u002Fspan>\n        <span style=\"font-family:'Open Sans',sans-serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim,rgba(255,255,255,.55));font-weight:700;\">How do you want to learn?<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:inline-flex;gap:4px;padding:5px;border-radius:999px;background:var(--glass,rgba(255,255,255,.06));border:1px solid var(--line,rgba(255,255,255,.14));\">\n        <sc-for list=\"{{ formats }}\" as=\"f\" hint-placeholder-count=\"2\">\n          <button onclick=\"{{ f.set }}\" class=\"lift\" style=\"{{ f.style }}\">\n            <span style=\"display:grid;place-items:center;\">{{ f.icon }}<\u002Fspan>{{ f.label }}\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"font-family:'Open Sans',sans-serif;font-size:14px;color:var(--ink-dim,rgba(255,255,255,.55));margin:14px 0 0;\">{{ formatHint }}<\u002Fp>\n\n      <!-- step 3: topic -->\n      <div style=\"display:flex;align-items:center;gap:12px;margin:42px 0 18px;\">\n        <span style=\"width:26px;height:26px;border-radius:50%;background:var(--accent,#0055FF);color:#fff;display:grid;place-items:center;font-family:'Plus Jakarta Sans';font-weight:700;font-size:13px;flex:none;\">3<\u002Fspan>\n        <span style=\"font-family:'Open Sans',sans-serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim,rgba(255,255,255,.55));font-weight:700;\">Pick a topic<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px;\">\n        <sc-for list=\"{{ topics }}\" as=\"t\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ t.set }}\" class=\"lift\" style=\"{{ t.style }}\" style-hover=\"transform:translateY(-4px);\">\n            <span style=\"{{ t.chip }}\">{{ t.icon }}<\u002Fspan>\n            <span style=\"flex:1;min-width:0;text-align:left;\">\n              <span style=\"display:block;font-family:'Plus Jakarta Sans';font-weight:700;font-size:16px;color:var(--ink,#fff);\">{{ t.title }}<\u002Fspan>\n              <span style=\"display:block;font-family:'Open Sans',sans-serif;font-size:13px;color:var(--ink-dim,rgba(255,255,255,.55));margin-top:3px;line-height:1.4;\">{{ t.desc }}<\u002Fspan>\n            <\u002Fspan>\n            <span style=\"{{ t.arrowStyle }}\">{{ t.arrowIcon }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;margin-top:26px;\">\n        <button onclick=\"{{ surprise }}\" class=\"lift\" style=\"display:inline-flex;align-items:center;gap:9px;padding:13px 24px;border-radius:999px;border:none;cursor:pointer;background:var(--gold,#FFB706);color:#0A2443;font-family:'Plus Jakarta Sans';font-weight:700;font-size:15px;box-shadow:0 16px 36px -16px var(--gold,#FFB706);\" style-hover=\"transform:translateY(-3px);\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M13 2L4 14h6l-1 8 9-12h-6z\"><\u002Fpath><\u002Fsvg>Surprise me\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- type your own -->\n      <div style=\"margin-top:34px;background:var(--glass,rgba(255,255,255,.05));border:1px solid var(--line,rgba(255,255,255,.12));border-radius:20px;padding:22px 24px;backdrop-filter:blur(10px);\">\n        <div style=\"font-family:'Open Sans',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim,rgba(255,255,255,.55));font-weight:700;\">Or type your own<\u002Fdiv>\n        <div style=\"display:flex;gap:12px;margin-top:14px;\">\n          <input oninput=\"{{ onCustom }}\" placeholder=\"e.g., how to use AI for budget forecasting\" style=\"flex:1;min-width:0;padding:15px 18px;border-radius:14px;border:1px solid var(--line,rgba(255,255,255,.16));background:var(--bg2,#fff);color:var(--ink,#fff);font-family:'Open Sans',sans-serif;font-size:15px;outline:none;\">\n          <button onclick=\"{{ generate }}\" class=\"lift\" style=\"flex:none;padding:0 26px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent,#0055FF),var(--accent2,#3B94FF));color:#fff;font-family:'Plus Jakarta Sans';font-weight:600;font-size:15px;box-shadow:0 16px 36px -18px var(--accent,#0055FF);\" style-hover=\"transform:translateY(-2px);\">Start<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"text-align:center;font-family:'Open Sans',sans-serif;font-size:13px;color:var(--ink-dim,rgba(255,255,255,.5));margin-top:30px;\">✨ Suggested topics are personalized to your role and tasks · Refreshes daily at 8 AM PT<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- LAUNCH BAR -->\n    <div style=\"{{ launchStyle }}\">\n      <div style=\"min-width:0;\">\n        <div style=\"font-family:'Open Sans',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim,rgba(255,255,255,.55));font-weight:700;\">Ready to generate<\u002Fdiv>\n        <div style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:15px;color:var(--ink,#fff);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48vw;margin-top:2px;\">{{ launchSummary }}<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ generate }}\" class=\"lift\" style=\"position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:10px;padding:15px 26px;border-radius:999px;border:none;cursor:pointer;background:var(--gold,#FFB706);color:#0A2443;font-family:'Plus Jakarta Sans';font-weight:700;font-size:15px;box-shadow:0 18px 40px -16px var(--gold,#FFB706);\" style-hover=\"transform:translateY(-2px);\">\n        <span style=\"position:absolute;top:0;left:0;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:sheen 3.4s ease-in-out infinite;\"><\u002Fspan>\n        <span style=\"position:relative;\">Generate lesson<\u002Fspan>\n        <svg style=\"position:relative;\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0A2443\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===================== COURSE OVERLAY ===================== -->\n  <div id=\"course\" style=\"{{ courseStyle }}\">\n    <!-- course ambient -->\n    <div style=\"position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(110% 80% at 50% -10%, var(--bg2,#1a0d3e) 0%, var(--bg,#06081a) 60%);overflow:hidden;\">\n      <div id=\"cglow\" style=\"position:absolute;top:-20%;left:50%;width:60vw;height:60vw;margin-left:-30vw;border-radius:50%;background:radial-gradient(circle,var(--accent2,#bd8cff) 0%,transparent 60%);opacity:.3;filter:blur(50px);\"><\u002Fdiv>\n      <div id=\"cfloor\" style=\"position:absolute;bottom:-30%;left:-10%;right:-10%;height:70%;background-image:linear-gradient(var(--line,rgba(255,255,255,.16)) 1px,transparent 1px),linear-gradient(90deg,var(--line,rgba(255,255,255,.16)) 1px,transparent 1px);background-size:60px 60px;transform:perspective(420px) rotateX(64deg);opacity:.18;mask-image:linear-gradient(to top,#000,transparent);-webkit-mask-image:linear-gradient(to top,#000,transparent);\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- floating course controls -->\n    <div style=\"position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:40;display:flex;align-items:center;gap:14px;padding:10px 12px 10px 14px;border-radius:999px;background:var(--navbg,rgba(20,16,46,.6));backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:1px solid var(--line,rgba(255,255,255,.14));box-shadow:0 18px 50px -18px rgba(0,0,0,.7);\">\n      <button onclick=\"{{ goDash }}\" class=\"lift\" style=\"display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;border:none;cursor:pointer;background:transparent;color:var(--ink,#fff);font-family:'Plus Jakarta Sans';font-weight:600;font-size:13px;\" style-hover=\"background:var(--glass,rgba(255,255,255,.1));\">\n        <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M19 12H5M11 6l-6 6 6 6\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Dashboard\n      <\u002Fbutton>\n      <div style=\"font-family:'Plus Jakarta Sans';font-weight:600;font-size:13px;color:var(--ink,#fff);\">Prompt Engineering<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;\">\n        <div style=\"width:130px;height:6px;border-radius:6px;background:var(--line,rgba(255,255,255,.14));overflow:hidden;\">\n          <div id=\"ctopbar\" style=\"height:100%;width:8%;border-radius:6px;background:linear-gradient(90deg,var(--accent,#5b8cff),var(--accent2,#bd8cff));transition:width .2s;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span id=\"ctoppct\" style=\"font-size:12px;color:var(--ink-dim,rgba(255,255,255,.6));font-variant-numeric:tabular-nums;min-width:34px;\">8%<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- vertical chapter rail -->\n    <div style=\"position:fixed;left:34px;top:50%;transform:translateY(-50%);z-index:30;display:flex;flex-direction:column;align-items:center;gap:0;\">\n      <div style=\"position:relative;width:3px;height:240px;border-radius:3px;background:var(--line,rgba(255,255,255,.14));overflow:hidden;\">\n        <div id=\"crail\" style=\"position:absolute;top:0;left:0;width:100%;height:8%;background:linear-gradient(var(--accent,#5b8cff),var(--accent2,#bd8cff));transition:height .2s;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative;z-index:10;max-width:880px;margin:0 auto;padding:0 32px;\">\n\n      <!-- HERO -->\n      <section style=\"min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;\">\n        <div id=\"chero\" style=\"display:flex;flex-direction:column;align-items:center;\">\n          <div style=\"display:inline-flex;align-items:center;gap:9px;padding:7px 15px;border-radius:999px;background:var(--glass,rgba(255,255,255,.06));border:1px solid var(--line,rgba(255,255,255,.14));font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent,#0055FF);font-weight:600;margin-bottom:26px;\">Chapter 03 · 12 min<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:clamp(56px,9vw,128px);line-height:.9;letter-spacing:-.04em;margin:0;color:var(--ink,#fff);\">Prompt<br><span style=\"background:linear-gradient(110deg,var(--accent,#5b8cff),var(--accent2,#bd8cff),var(--gold,#ffc24b));background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:gradFlow 7s linear infinite;\">Engineering<\u002Fspan><\u002Fh1>\n          <p style=\"font-size:19px;line-height:1.5;color:var(--ink-dim,rgba(255,255,255,.65));max-width:480px;margin:28px 0 0;\">Turn vague requests into reliable AI results. The difference between a toy and a tool is how you ask.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:absolute;bottom:46px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--ink-dim,rgba(255,255,255,.55));font-size:12px;letter-spacing:.14em;text-transform:uppercase;animation:floatB 2.4s ease-in-out infinite;\">\n          Scroll to begin\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 9l6 6 6-6\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- OUTCOMES -->\n      <section class=\"reveal\" style=\"padding:90px 0;\">\n        <div style=\"font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent2,#bd8cff);font-weight:600;margin-bottom:14px;\">What you'll master<\u002Fdiv>\n        <h2 style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:clamp(30px,4.4vw,52px);line-height:1.02;letter-spacing:-.03em;margin:0 0 40px;color:var(--ink,#fff);\">Three moves that change everything.<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n          <sc-for list=\"{{ outcomes }}\" as=\"o\" hint-placeholder-count=\"3\">\n            <div class=\"lift\" style=\"padding:26px 22px;border-radius:18px;background:var(--glass,rgba(255,255,255,.05));border:1px solid var(--line,rgba(255,255,255,.1));backdrop-filter:blur(10px);\" style-hover=\"transform:translateY(-6px);border-color:var(--accent,rgba(91,140,255,.5));\">\n              <div style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:30px;color:var(--accent2,#bd8cff);\">{{ o.n }}<\u002Fdiv>\n              <div style=\"font-family:'Plus Jakarta Sans';font-weight:600;font-size:19px;color:var(--ink,#fff);margin-top:10px;\">{{ o.t }}<\u002Fdiv>\n              <div style=\"font-size:14px;line-height:1.5;color:var(--ink-dim,rgba(255,255,255,.55));margin-top:8px;\">{{ o.d }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- CONCEPT -->\n      <section class=\"reveal\" style=\"padding:60px 0;\">\n        <div style=\"font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent2,#bd8cff);font-weight:600;margin-bottom:14px;\">The anatomy<\u002Fdiv>\n        <h2 style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:clamp(30px,4.4vw,52px);line-height:1.02;letter-spacing:-.03em;margin:0 0 32px;color:var(--ink,#fff);\">A strong prompt has four layers.<\u002Fh2>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <sc-for list=\"{{ layers }}\" as=\"l\" hint-placeholder-count=\"4\">\n            <div class=\"lift\" style=\"display:flex;align-items:center;gap:18px;padding:20px 24px;border-radius:16px;background:linear-gradient(100deg,{{ l.glow }},var(--glass,rgba(255,255,255,.04)));border:1px solid var(--line,rgba(255,255,255,.1));\" style-hover=\"transform:translateX(8px);\">\n              <div style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink,#fff);min-width:96px;\">{{ l.label }}<\u002Fdiv>\n              <div style=\"font-size:15px;color:var(--ink-dim,rgba(255,255,255,.7));font-style:italic;\">\"{{ l.example }}\"<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ACTIVITY -->\n      <section class=\"reveal\" style=\"padding:60px 0 40px;\">\n        <div style=\"font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent,#0055FF);font-weight:600;margin-bottom:14px;\">Your move<\u002Fdiv>\n        <h2 style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:clamp(30px,4.4vw,52px);line-height:1.02;letter-spacing:-.03em;margin:0 0 14px;color:var(--ink,#fff);\">Which prompt gets a usable answer?<\u002Fh2>\n        <p style=\"font-size:16px;color:var(--ink-dim,rgba(255,255,255,.6));margin:0 0 28px;\">You need a customer follow-up email after a completed HVAC repair.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n          <button onclick=\"{{ pickA }}\" style=\"{{ optAStyle }}\">\n            <div style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim,rgba(255,255,255,.5));margin-bottom:10px;\">Option A<\u002Fdiv>\n            <div style=\"font-size:16px;line-height:1.5;color:var(--ink,#fff);\">\"Write a follow-up email to a customer.\"<\u002Fdiv>\n          <\u002Fbutton>\n          <button onclick=\"{{ pickB }}\" style=\"{{ optBStyle }}\">\n            <div style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim,rgba(255,255,255,.5));margin-bottom:10px;\">Option B<\u002Fdiv>\n            <div style=\"font-size:16px;line-height:1.5;color:var(--ink,#fff);\">\"You're a friendly HVAC dispatcher. Write a 4-sentence follow-up email thanking the customer for the AC repair, confirming the 1-year warranty, and inviting a Google review.\"<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"{{ feedbackStyle }}\">\n          <span style=\"font-weight:700;\">{{ feedbackTitle }}<\u002Fspan> {{ feedbackBody }}\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:center;margin-top:34px;\">\n          <button onclick=\"{{ doComplete }}\" class=\"lift\" style=\"{{ completeBtnStyle }}\">\n            <span style=\"position:relative;\">Complete lesson<\u002Fspan>\n            <svg style=\"position:relative;\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12l5 5L20 7\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <div style=\"height:120px;\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- COMPLETION MOMENT -->\n    <div style=\"{{ completePanelStyle }}\">\n      <div style=\"text-align:center;max-width:460px;padding:0 24px;\">\n        <div style=\"position:relative;width:128px;height:128px;margin:0 auto 8px;display:grid;place-items:center;\">\n          <div style=\"position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,var(--gold,#ffc24b),transparent 65%);opacity:.6;animation:pulseGlow 2s ease-in-out infinite;\"><\u002Fdiv>\n          <div style=\"position:absolute;inset:18%;border-radius:50%;border:2px dashed var(--gold,#ffc24b);animation:spinSlow 16s linear infinite;\"><\u002Fdiv>\n          <div style=\"position:relative;width:74px;height:74px;border-radius:22px;background:linear-gradient(135deg,var(--gold,#ffc24b),var(--accent2,#bd8cff));display:grid;place-items:center;box-shadow:0 0 36px var(--gold,rgba(255,194,75,.7));\">\n            <svg width=\"36\" height=\"36\" v
